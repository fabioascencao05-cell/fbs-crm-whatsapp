<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 280px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111b21; color: #e9edef; margin: 0; }
    h1 { font-size: 16px; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
    h1 span { color: #25D366; }
    p { font-size: 12px; color: #8696a0; margin: 0 0 12px; line-height: 1.5; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #25D366; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #25D366; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  </style>
</head>
<body>
  <h1>🎽 <span>FBS CRM</span></h1>
  <p>CRM integrado ao WhatsApp Web.<br>Abra o WhatsApp Web para visualizar o painel.</p>
  <div class="status"><div class="dot"></div>Extensão ativa</div>
</body>
</html>
